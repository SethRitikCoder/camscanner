name: cam_scanner
description: "High-performance offline Document Scanner App in Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_mlkit_document_scanner: ^0.2.0
  google_mlkit_text_recognition: ^0.13.0
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0
  flutter_image_compress: ^2.1.0
  pdf: ^3.10.8
  printing: ^5.11.1
  google_mobile_ads: ^5.0.0
  share_plus: ^9.0.0
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  intl: ^0.19.0
  camera: ^0.10.6
  provider: ^6.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#00A86B"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
